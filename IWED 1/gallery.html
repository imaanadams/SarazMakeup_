<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- SEO #1: Unique descriptive title -->
        <title>Gallery | Saraz Makeup Artist – Cape Town Portfolio</title>

        <!-- SEO #2: Description shown in Google results -->
        <meta name="description" content="Browse the Saraz Makeup portfolio. See bridal, matric ball, soft glam and full glam makeup looks by a professional Cape Town makeup artist.">

        <!-- SEO #3: Keywords -->
        <meta name="keywords" content="makeup gallery Cape Town, bridal makeup photos, matric ball makeup, soft glam makeup, full glam makeup, makeup portfolio South Africa">

        <!-- SEO #4: Author -->
        <meta name="author" content="Saraz Makeup">

        <!-- SEO #5: Tell Google to index this page -->
        <meta name="robots" content="index, follow">

        <!-- SEO #6: Open Graph — how page looks when shared on WhatsApp/Facebook -->
        <meta property="og:title" content="Saraz Makeup Gallery – Cape Town">

        <meta property="og:locale" content="en_ZA">

    </head>
