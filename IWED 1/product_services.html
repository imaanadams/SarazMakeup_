<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- SEO #1: Unique descriptive title -->
        <title>Products &amp; Services | Saraz Makeup Artist – Cape Town</title>

        <!-- SEO #2: Description shown in Google results -->
        <meta name="description" content="View Saraz Makeup's services and pricing — bridal R3000, matric ball R500, soft glam R900, full glam R1100. Professional makeup artist based in Cape Town, SA.">

        <!-- SEO #3: Keywords -->
        <meta name="keywords" content="makeup services Cape Town, makeup pricing South Africa, bridal makeup R3000, matric ball makeup Cape Town, soft glam pricing, full glam makeup SA">

        <!-- SEO #4: Author -->
        <meta name="author" content="Saraz Makeup">

        <!-- SEO #5: Tell Google to index this page -->
        <meta name="robots" content="index, follow">

        <!-- SEO #6: Open Graph — how page looks when shared on WhatsApp/Facebook -->
        <meta property="og:title" content="Products &amp; Services – Saraz Makeup Cape Town">

        <!-- SEO #7: Canonical URL -->
        <link rel="canonical" href="product_services.html">

        <link rel="stylesheet" href="css/style.css">

        <!-- SEO #8: Schema.org — pricing info for Google -->
        <script type="application/ld+json">

            "@context": "https://schema.org",
            "@type": "BeautySalon",
            "name": "Saraz Makeup",
            "description": "Professional makeup artist in Cape Town offering bridal, matric ball, soft glam and full glam services.",
            "telephone": "+27720197504",
            "email": "sarazmakeup.za@gmail.com",
            "address": {
                "@type": "PostalAddress",
                "addressLocality": "Cape Town",
                "addressCountry": "ZA"
            },
            "hasOfferCatalog": {
                "@type": "OfferCatalog",
                "name": "Makeup Services",

        }
        </script>
